edition = "2021"

# Do NOT reformat the vendored crates — keep `vendor/*` byte-identical to the
# upstream sources (plus our explicit patches) so the patch artifacts stay a
# minimal, reviewable diff. rustfmt's `ignore` key is nightly-only, so on the
# project's stable toolchain this is a convention, not enforcement: CI runs
# `cargo fmt` per workspace package (never `--all`), and a local
# `cargo fmt --all` *will* touch `vendor/` — revert that diff. On a nightly
# toolchain you can enforce it with `ignore = ["vendor"]`.

max_width = 100
use_small_heuristics = "Max"

hard_tabs = false
tab_spaces = 4
newline_style = "Unix"

reorder_imports = true
reorder_modules = true

fn_call_width = 80
attr_fn_like_width = 80
chain_width = 70

struct_lit_width = 40
struct_variant_width = 40

single_line_if_else_max_width = 60

match_block_trailing_comma = true
