[env]
# zig as cross-linker/ar for cargo-zigbuild musl targets.
AR = { value = "zig ar", force = true }
RANLIB = { value = "zig ranlib", force = true }

[alias]
# --- outline-ss-rust (server) cross builds ---
ss-build-musl-x86_64 = "zigbuild -p outline-ss-rust --target x86_64-unknown-linux-musl"
ss-release-musl-x86_64 = "zigbuild --release -p outline-ss-rust --target x86_64-unknown-linux-musl"
ss-build-musl-aarch64 = "zigbuild -p outline-ss-rust --target aarch64-unknown-linux-musl"
ss-release-musl-aarch64 = "zigbuild --release -p outline-ss-rust --target aarch64-unknown-linux-musl"
ss-build-musl-arm = "zigbuild -p outline-ss-rust --target arm-unknown-linux-musleabi"
ss-release-musl-arm = "zigbuild --release -p outline-ss-rust --target arm-unknown-linux-musleabi"
ss-build-musl-armv7 = "zigbuild -p outline-ss-rust --target armv7-unknown-linux-musleabihf"
ss-release-musl-armv7 = "zigbuild --release -p outline-ss-rust --target armv7-unknown-linux-musleabihf"

# --- outline-ws-rust (client) cross builds ---
ws-release-musl-x86_64 = "zigbuild --release -p outline-ws-rust --target x86_64-unknown-linux-musl"
ws-release-musl-aarch64 = "zigbuild --release -p outline-ws-rust --target aarch64-unknown-linux-musl"
