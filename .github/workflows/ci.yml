name: CI

# Quality gate for pull requests and pushes to main. The release workflows
# (`*-release*.yml`) only build artifacts; this is the only workflow that runs
# fmt / clippy / tests / the monorepo invariants, so it is the merge gate.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # .cargo/config.toml forces AR/RANLIB to `zig ar`/`zig ranlib` for every
      # build (not just the zigbuild cross aliases), so ring's build script
      # needs zig on PATH even for a native host check.
      #
      # The runner's "node20 deprecated" annotation on this step is known and
      # safe: setup-zig v2.2.1 (latest release; what @v2 resolves to) still
      # declares node20, and upstream keeps it that way on purpose for ZSF's
      # Debian-stable self-hosted runners (Codeberg mlugg/setup-zig PR #55;
      # the GitHub repo is a read-only mirror). Verified 2026-06-12: the
      # v2.2.1 JS runs the full fetch/extract/tool-cache/zig cycle cleanly
      # under Node 24, so GitHub's 2026-06-16 forced-Node-24 switch is a
      # no-op here. Keep @v2 — it will pick up the eventual node24 release
      # automatically.
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - uses: Swatinem/rust-cache@v2

      # `cargo fmt --all` would also reformat the vendored `sockudo-ws`
      # workspace member, which we keep in upstream style — so the check lists
      # our own packages explicitly instead of `--all`.
      - name: rustfmt (our crates only; vendored kept in upstream style)
        run: >
          cargo fmt --check
          -p outline-ss-rust -p outline-ws-rust
          -p outline-metrics -p outline-net -p outline-routing
          -p outline-transport -p outline-tun
          -p outline-uplink -p outline-wire -p shadowsocks-crypto -p socks5-proto

      # `--no-deps` keeps clippy off the vendored members (they are linted as
      # dependencies otherwise). The style/complexity backlog was cleared, so
      # the gate denies everything clippy emits at its default lint levels.
      # `[workspace.lints.clippy]` in the root Cargo.toml adjusts two of them:
      # `type_complexity` is allowed until the god-object refactors land, and
      # `undocumented_unsafe_blocks` is raised to warn — which `-D warnings`
      # turns into a hard failure, so an `unsafe` without a `// SAFETY:`
      # comment cannot merge.
      - name: clippy (deny all default-level warnings)
        run: >
          cargo clippy --workspace --exclude sockudo-ws --all-targets --no-deps --
          -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # zig is required because .cargo/config.toml forces AR/RANLIB to zig for
      # every build (see the lint job for details).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace --exclude sockudo-ws

  features-and-invariants:
    name: feature matrix + monorepo invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # zig is required because .cargo/config.toml forces AR/RANLIB to zig for
      # every build (see the lint job for details).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - uses: Swatinem/rust-cache@v2

      - name: check default workspace
        run: cargo check --workspace --exclude sockudo-ws

      - name: check server without default features (control gated off)
        run: cargo check -p outline-ss-rust --no-default-features

      - name: check client without default features
        run: cargo check -p outline-ws-rust --no-default-features

      # Monorepo invariant: rustls must stay on a single CryptoProvider
      # (aws-lc-rs). Two providers panic at runtime ("exactly one of aws-lc-rs
      # and ring"). The `ring` crate itself stays for SS AEAD / SHA-256, but
      # never as the rustls provider.
      - name: invariant — aws-lc-rs only, no ring rustls provider
        run: |
          if cargo tree -i 'rustls@0.23' -e features 2>/dev/null | grep -q 'rustls feature "ring"'; then
            echo "::error::rustls is pulling its ring provider; the workspace must stay on aws-lc-rs only"
            cargo tree -i 'rustls@0.23' -e features | grep 'rustls feature'
            exit 1
          fi
          echo "ok: rustls is on aws-lc-rs only"

      # Monorepo invariant: every direct sockudo-ws reference in production
      # code stays behind the two vendored-gate modules, so rebasing the
      # vendored crates touches one file per side (see PATCHES.md). Test
      # modules are exempt — they impersonate the client on purpose.
      - name: invariant — vendored sockudo-ws API only behind gate modules
        run: |
          leaked=$(grep -rn 'sockudo_ws' bins/*/src crates/*/src --include='*.rs' \
            | grep -v '/tests/' \
            | grep -v '^crates/outline-transport/src/h3/vendored\.rs:' \
            | grep -v '^bins/outline-ss-rust/src/server/h3/vendored\.rs:' || true)
          if [ -n "$leaked" ]; then
            echo "::error::sockudo_ws referenced outside the vendored gate modules:"
            echo "$leaked"
            exit 1
          fi
          echo "ok: sockudo-ws stays behind the gate modules"

      # Install-script invariants: syntax + shellcheck for the two root
      # installers, and byte-identity of the helpers deliberately duplicated
      # between install-server.sh and install-client.sh (single-file
      # curl|bash delivery rules out a sourced library; this gate replaces
      # it). shellcheck is preinstalled on ubuntu runners.
      - name: invariant — install scripts (syntax, shellcheck, shared helpers)
        run: .github/scripts/check-install-scripts.sh
