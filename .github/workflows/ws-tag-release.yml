name: Tag Release (client)

on:
  push:
    tags:
      - "ws-v*"

permissions:
  contents: write

concurrency:
  group: ws-tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_ws-release-build.yml
    with:
      tag: ${{ github.ref_name }}
      prerelease: false
      make_latest: "true"
