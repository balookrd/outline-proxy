name: Nightly Release (server)

on:
  push:
    branches:
      - main
    paths:
      - "bins/outline-ss-rust/**"
      - "crates/**"
      - "vendor/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - ".github/workflows/ss-nightly-release.yml"
      - ".github/workflows/_ss-release-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ss-nightly-release
  cancel-in-progress: true

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'release: cut ')
    uses: ./.github/workflows/_ss-release-build.yml
    with:
      tag: ss-nightly
      checkout_ref: ${{ github.sha }}
      prerelease: true
      make_latest: "false"
      release_name: Server Nightly
      artifact_version: nightly-${{ github.sha }}
      rolling_tag: true
