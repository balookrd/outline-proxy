name: Nightly Release (client)

on:
  push:
    branches:
      - main
    paths:
      - "bins/outline-ws-rust/**"
      - "crates/**"
      - "vendor/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".cargo/**"
      - ".github/scripts/build-release-asset.sh"
      - ".github/workflows/ws-nightly-release.yml"
      - ".github/workflows/_ws-release-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ws-nightly-release
  cancel-in-progress: true

jobs:
  release:
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'release: cut ')
    uses: ./.github/workflows/_ws-release-build.yml
    with:
      tag: ws-nightly
      checkout_ref: ${{ github.sha }}
      prerelease: true
      make_latest: "false"
      release_name: Client Nightly
      artifact_version: nightly-${{ github.sha }}
      rolling_tag: true
