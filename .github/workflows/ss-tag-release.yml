name: Tag Release (server)

on:
  push:
    tags:
      - "ss-v*"

permissions:
  contents: write

concurrency:
  group: ss-tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_ss-release-build.yml
    with:
      tag: ${{ github.ref_name }}
      prerelease: false
      make_latest: "true"
